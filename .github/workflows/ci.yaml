name: CI/CD - API Node

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-check-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Validar sintaxe básica
        run: node -c app.js

      - name: Subir aplicação em background
        run: |
          npm start &
          sleep 5

      - name: Testar endpoint principal
        run: curl http://localhost:3000

      - name: Testar healthcheck
        run: curl http://localhost:3000/health

      - name: Testar users
        run: curl http://localhost:3000/users

      - name: Fazer login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build da imagem Docker
        run: docker build -t ghcr.io/oaleffemanuel/projeto-1-api-docker:latest .

      - name: Publicar imagem no GHCR
        run: docker push ghcr.io/oaleffemanuel/projeto-1-api-docker:latest